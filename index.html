<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UM Panchanga Review Panel</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .col-selector {
            transform: scale(1.2);
            margin-top: 5px;
            cursor: pointer;
        }
        .data-col {
            text-align: center;
            font-size: 13px;
            line-height: 1.2;
            vertical-align: top;
            padding-bottom: 5px !important;
        }
    </style>
</head>

<body>

<header class="header" style="display:flex; justify-content:space-between; align-items:center; padding: 0 20px;">
    <span>UM Panchanga Review Panel</span>
    <button onclick="logoutUser()" style="background:#e53935; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:14px; font-weight:600;">Logout</button>
</header>

<main class="container">

    <section class="card">
        <h3>Filter & Generate Data</h3>

        <div class="form-grid">

            <div class="form-group">
                <label for="language">Language</label>
                <select id="language">
                    <option value="">-- Select --</option>
                    <option>English</option>
                    <option>Tamil</option>
                    <option>Telugu</option>
                    <option>Kannada</option>
                    <option>Sanskrit</option>
                    <option>Marathi</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fromDate">From Date</label>
                <input type="date" id="fromDate">
            </div>

            <div class="form-group">
                <label for="toDate">To Date (Optional)</label>
                <input type="date" id="toDate">
            </div>

            <div class="form-group">
                <label for="rows">Total Rows</label>
                <input type="number" id="rows" readonly>
            </div>

        </div>

        <div class="form-actions">
            <button class="btn btn-primary" onclick="generateRows()">Generate</button>
            <button class="btn btn-danger" onclick="resetAll()">Reset</button>
        </div>

    </section>

    <section class="card">
        <h3>Panchanga Data Entry</h3>

        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th style="min-width: 50px;">Select Row</th>
                        <th>Date</th>
                        <th>Month</th>
                        <th>Year</th>
                        <th class="data-col">Rutu<br><input type="checkbox" class="col-selector" data-field="rutu" checked></th>
                        <th class="data-col">Masa<br><input type="checkbox" class="col-selector" data-field="masa" checked></th>
                        <th class="data-col">Masa Niyamaka<br><input type="checkbox" class="col-selector" data-field="masaNiyamaka" checked></th>
                        <th class="data-col">Paksha<br><input type="checkbox" class="col-selector" data-field="paksha" checked></th>
                        <th class="data-col">Thithi<br><input type="checkbox" class="col-selector" data-field="thithi" checked></th>
                        <th class="data-col">Vasara<br><input type="checkbox" class="col-selector" data-field="vasara" checked></th>
                        <th class="data-col">Nakshatra<br><input type="checkbox" class="col-selector" data-field="nakshatra" checked></th>
                        <th class="data-col">Yoga<br><input type="checkbox" class="col-selector" data-field="yoga" checked></th>
                        <th class="data-col">Karana<br><input type="checkbox" class="col-selector" data-field="karana" checked></th>
                        <th class="data-col">Shradha Tithi<br><input type="checkbox" class="col-selector" data-field="shradhatithi" checked></th>
                        <th class="data-col">Vishesha<br><input type="checkbox" class="col-selector" data-field="vishesha" checked></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <br>
    <div>

        <button class="btn btn-success" onclick="submitData()">Submit</button>
        <button class="btn btn-primary" onclick="clearSelectedRows()">Clear</button>
        <button class="btn btn-danger" onclick="deleteSelectedRows()">Delete</button>
    </div>

    </section>

</main>

<script src="js/config.js"></script>
<script>
    // Authentication Guard
    (function() {
        if (localStorage.getItem("isLoggedIn") !== "true") {
            window.location.replace("/login");
        }
    })();

    function logoutUser() {
        localStorage.removeItem("isLoggedIn");
        localStorage.removeItem("authToken");
        window.location.replace("/login");
    }
</script>
<!-- The config.js script handles Dynamic Backend URL detection. No hardcoded overrides needed. -->
<script src="js/app.js"></script>
<script src="js/panchanga.js"></script>
<script src="js/submit.js"></script>
<script src="js/utils.js"></script>

</body>
</html>
