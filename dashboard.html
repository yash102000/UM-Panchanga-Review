<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UM Panchanga Review Panel</title>
    <link rel="stylesheet" href="css/style.css">
    <script>

        (function () {
            if (localStorage.getItem("isLoggedIn") !== "true") {
                const loginPath = window.location.hostname === 'localhost' ? 'pages/login.html' : '/login';
                window.location.replace(loginPath);
            }
        })();
    </script>
    <style>
        .col-selector {
            transform: scale(1.2);
            margin-top: 5px;
            cursor: pointer;
        }

        .data-col {
            text-align: center;
            font-size: 15px;
            line-height: 1.2;
            vertical-align: middle;
            width: 120px;
        }

        th,
        td {
            text-align: center !important;
            padding: 10px 5px !important;
        }

        .date-col {
            width: 70px;
        }

        .checkbox-col {
            width: 50px;
        }
    </style>
</head>

<body>

    <header class="header" style="display:flex; justify-content:space-between; align-items:center; padding: 0 20px;">
        <span>UM Panchanga Review Panel</span>
        <button onclick="logoutUser()"
            style="background:#e53935; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:14px; font-weight:600;">Logout</button>
    </header>

    <main class="container">

        <section class="card">
            <h3>Targeted Review Selection</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label for="language">Language</label>
                    <select id="language">
                        <option value="">-- Select --</option>
                        <option>English</option>
                        <option>Tamil</option>
                        <option>Telugu</option>
                        <option>Kannada</option>
                        <option>Sanskrit</option>
                        <option>Marathi</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="targetDate">Select Date</label>
                    <input type="date" id="targetDate">
                </div>

                <div class="form-group" style="grid-column: span 1;">
                    <label>Select Fields</label>
                    <div style="margin-bottom: 8px;">
                        <button type="button" class="btn btn-primary"
                            style="padding: 2px 8px; font-size: 11px; background: #666;"
                            onclick="toggleAllChecks(true)">All</button>
                        <button type="button" class="btn btn-primary"
                            style="padding: 2px 8px; font-size: 11px; background: #666;"
                            onclick="toggleAllChecks(false)">None</button>
                    </div>
                    <div id="fieldChecklist"
                        style="max-height: 150px; overflow-y: auto; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 6px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                        <!-- Checkboxes will be generated here -->
                    </div>
                </div>
            </div>

            <div class="form-actions" style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="addTargetedRows()">Add to Worklist</button>
                <button class="btn btn-danger" onclick="resetWorklist()">Reset All</button>
            </div>
        </section>

        <section class="card" id="worklistSection" style="display: none;">
            <h3>Review & Submit</h3>

            <div id="worklistContainer">
                <!-- Multiple Targeted Tables will be generated here -->
            </div>

            <div class="form-actions" style="margin-top: 20px;">
                <button class="btn btn-success" onclick="submitWorklist()">Submit All Changes</button>
                <button class="btn btn-primary" style="background:#555;" onclick="clearWorklistData()">Clear
                    All</button>
            </div>
        </section>

    </main>

    <script src="js/config.js"></script>
    <script>
        function logoutUser() {
            localStorage.removeItem("isLoggedIn");
            localStorage.removeItem("authToken");
            window.location.replace(window.location.hostname === 'localhost' ? 'pages/login.html' : '/login');
        }
    </script>
    <!-- The config.js script handles Dynamic Backend URL detection. No hardcoded overrides needed. -->
    <script src="js/app.js"></script>
    <script src="js/panchanga.js"></script>
    <script src="js/submit.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/validation.js"></script>

</body>

</html>
